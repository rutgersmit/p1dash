services:
  p1dash:
    image: ghcr.io/rutgersmit/p1dash:main   # pre-built image from GitHub Actions
    # build: .                            # uncomment to build locally instead
    ports:
      - "${PORT:-3012}:${PORT:-3000}"
    environment:
      - NODE_ENV=production
    volumes:
      - ./data:/app/config
    restart: unless-stopped
